# Compile the JOSS paper (paper/paper.md) with the same openjournals/inara
# pipeline the JOSS Editorial Bot uses, per
# https://joss.readthedocs.io/en/latest/paper.html#checking-that-your-paper-compiles
# The rendered PDF appears as a downloadable artifact on the run.
name: Draft PDF
on:
  push:
    paths:
      - paper/**
      - .github/workflows/draft-pdf.yml

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Paper Draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
